name: Build Mod Menu iOS

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Lay code ve may ao
      uses: actions/checkout@v4
    
    - name: Compile dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        
        # Biên dịch dylib bằng Clang liên kết chính xác TOÀN BỘ các thư viện hệ thống trong ảnh sếp gửi
        clang -dynamiclib -arch arm64 \
          -isysroot $SDK \
          -fobjc-arc \
          -miphoneos-version-min=13.0 \
          -framework UIKit \
          -framework Foundation \
          -framework CoreFoundation \
          -framework CoreGraphics \
          -framework QuartzCore \
          -framework WebKit \
          -framework AVFoundation \
          -framework AVKit \
          -framework PhotosUI \
          -framework SafariServices \
          -framework Security \
          -framework IOSurface \
          -undefined dynamic_lookup \
          -o GrannyModMenu.dylib make.dylib.m
          
    - name: Tai file dylib len de nguoi dung download
      uses: actions/upload-artifact@v4
      with:
        name: GrannyModMenu-iOS
        path: GrannyModMenu.dylib

