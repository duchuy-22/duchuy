name: Create FFCheat

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Create FFCheat file
      run: |
        # Tạo file không đuôi
        echo "FFCheat file" > FFCheat
        # Hoặc nén thư mục thành file không đuôi
        zip -r FFCheat make.dylib.m menu.html
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: FFCheat
        path: FFCheat
