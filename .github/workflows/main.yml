name: Build FF Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install ldid
        sudo ln -sf /usr/bin/ldid /usr/local/bin/ldid
        
    - name: Build dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        clang -dynamiclib -arch arm64 \
          -isysroot $SDK \
          -fobjc-arc \
          -miphoneos-version-min=13.0 \
          -framework UIKit \
          -framework WebKit \
          -framework Foundation \
          -framework CoreGraphics \
          -framework QuartzCore \
          -framework Security \
          -undefined dynamic_lookup \
          -o FFMod.dylib make.dylib.m
          
    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: FFMod
        path: FFMod.dylib
